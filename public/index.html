<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pepinazo AI</title>
<style>
body {
font-family: Arial, sans-serif;
max-width: 1200px;
margin: 40px auto;
padding: 20px;
background: #f7f7f7;
color: #111;
}

h1 {
margin-bottom: 10px;
}

.topbar {
display: flex;
flex-wrap: wrap;
gap: 10px;
align-items: center;
margin-bottom: 15px;
}

.topbar input {
padding: 10px 12px;
font-size: 14px;
border: 1px solid #bbb;
border-radius: 8px;
background: #fff;
}

#userId {
min-width: 220px;
}

.acciones {
display: flex;
flex-wrap: wrap;
gap: 8px;
margin-bottom: 15px;
}

.acciones button,
#btn {
padding: 12px 16px;
font-size: 14px;
border: none;
border-radius: 8px;
cursor: pointer;
background: #111;
color: white;
}

.acciones button.secundario {
background: #444;
}

.acciones button.peligro {
background: #b00020;
}

.acciones button:disabled,
#btn:disabled {
opacity: 0.6;
cursor: not-allowed;
}

.layout {
display: grid;
grid-template-columns: 2fr 1fr;
gap: 16px;
}

@media (max-width: 950px) {
.layout {
grid-template-columns: 1fr;
}
}

.panel {
border: 1px solid #ccc;
background: #fff;
border-radius: 10px;
padding: 15px;
}

#chat {
min-height: 350px;
max-height: 550px;
overflow-y: auto;
white-space: pre-wrap;
padding-right: 4px;
}

.fila {
display: flex;
gap: 10px;
margin-top: 15px;
}

#msg {
flex: 1;
padding: 12px;
font-size: 16px;
border: 1px solid #bbb;
border-radius: 8px;
outline: none;
}

.mensaje {
margin-bottom: 18px;
padding-bottom: 12px;
border-bottom: 1px solid #eee;
}

.autor {
font-weight: bold;
display: block;
margin-bottom: 6px;
}

.usuario .autor {
color: #0b57d0;
}

.bot .autor {
color: #111;
}

.error .autor {
color: #b00020;
}

.sistema .autor {
color: #6a1b9a;
}

.texto {
line-height: 1.5;
}

.hint {
font-size: 13px;
color: #666;
margin-top: 10px;
}

.estado {
font-size: 13px;
color: #444;
margin-top: 8px;
min-height: 18px;
}

#sideTitle {
margin-top: 0;
margin-bottom: 12px;
font-size: 18px;
}

#sideContent {
font-size: 14px;
line-height: 1.5;
white-space: pre-wrap;
max-height: 650px;
overflow-y: auto;
}

.mini {
font-size: 12px;
color: #666;
margin-top: 8px;
}

.side-block {
border-bottom: 1px solid #eee;
padding-bottom: 12px;
margin-bottom: 12px;
}

.side-block:last-child {
border-bottom: none;
margin-bottom: 0;
}

.side-subtitle {
font-weight: bold;
margin-bottom: 8px;
display: block;
}

.memory-item,
.profile-item {
border: 1px solid #e6e6e6;
border-radius: 8px;
padding: 10px;
margin-bottom: 10px;
background: #fafafa;
}

.memory-text,
.profile-text {
margin-bottom: 8px;
white-space: pre-wrap;
word-break: break-word;
}

.memory-meta,
.profile-meta {
font-size: 12px;
color: #666;
margin-bottom: 8px;
}

.item-actions {
display: flex;
flex-wrap: wrap;
gap: 6px;
}

.item-actions button {
padding: 6px 10px;
font-size: 12px;
border: none;
border-radius: 6px;
cursor: pointer;
background: #333;
color: white;
}

.item-actions button.peligro {
background: #b00020;
}

.item-actions button.secundario {
background: #555;
}

.tag {
display: inline-block;
padding: 2px 8px;
border-radius: 999px;
font-size: 11px;
background: #eee;
margin-left: 6px;
color: #333;
}

.summary-box {
background: #f3f3f3;
border-radius: 8px;
padding: 10px;
white-space: pre-wrap;
margin-bottom: 12px;
}
</style>
</head>
<body>
<h1>Pepinazo AI</h1>

<div class="topbar">
<label for="userId"><strong>User ID:</strong></label>
<input
id="userId"
type="text"
placeholder="ej: diego-1"
autocomplete="off"
/>
</div>

<div class="acciones">
<button class="secundario" onclick="verPerfil()">Ver perfil</button>
<button class="secundario" onclick="verMemoria()">Ver memoria</button>
<button class="secundario" onclick="verPanelMemoria()">Panel memoria</button>
<button class="secundario" onclick="limpiarChat()">Limpiar chat</button>
<button class="peligro" onclick="borrarMemoria()">Borrar memoria</button>
</div>

<div class="layout">
<div class="panel">
<div id="chat"></div>

<div class="fila">
<input
id="msg"
type="text"
placeholder="Escribe tu mensaje..."
autocomplete="off"
/>
<button id="btn" onclick="enviar()">Enviar</button>
</div>

<div id="estado" class="estado"></div>

<div class="hint">
Pepinazo ya conversa con backend real. Ahora sí, el muñeco dejó de ser decoración.
</div>
</div>

<div class="panel">
<h2 id="sideTitle">Memoria / Perfil</h2>
<div id="sideContent">Aquí aparecerá el perfil, memoria y panel resumido.</div>
<div class="mini">
Consejo poco glamoroso pero útil: usa siempre el mismo userId para que Pepinazo no sufra amnesia selectiva.
</div>
</div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("msg");
const btn = document.getElementById("btn");
const estado = document.getElementById("estado");
const sideTitle = document.getElementById("sideTitle");
const sideContent = document.getElementById("sideContent");
const userIdInput = document.getElementById("userId");

const STORAGE_KEY = "pepinazo_user_id";
let ultimoPanel = null;

function getUserId() {
const value = userIdInput.value.trim();
return value || "usuario1";
}

function saveUserId() {
localStorage.setItem(STORAGE_KEY, getUserId());
}

function loadUserId() {
const saved = localStorage.getItem(STORAGE_KEY);
userIdInput.value = saved || "usuario1";
}

function setEstado(texto) {
estado.textContent = texto || "";
}

function escapeHtml(text) {
return String(text || "")
.replaceAll("&", "&amp;")
.replaceAll("<", "&lt;")
.replaceAll(">", "&gt;")
.replaceAll('"', "&quot;")
.replaceAll("'", "&#039;");
}

function agregarMensaje(tipo, autor, texto) {
const bloque = document.createElement("div");
bloque.className = `mensaje ${tipo}`;

const autorEl = document.createElement("span");
autorEl.className = "autor";
autorEl.textContent = autor;

const textoEl = document.createElement("div");
textoEl.className = "texto";
textoEl.textContent = texto;

bloque.appendChild(autorEl);
bloque.appendChild(textoEl);
chat.appendChild(bloque);
chat.scrollTop = chat.scrollHeight;
}

function limpiarChat() {
chat.innerHTML = "";
agregarMensaje(
"sistema",
"Sistema",
`Chat limpiado para ${getUserId()}. La memoria persistente sigue intacta.`
);
}

function setLoading(isLoading) {
input.disabled = isLoading;
btn.disabled = isLoading;
userIdInput.disabled = isLoading;

if (isLoading) {
btn.textContent = "Pensando...";
setEstado("Pepinazo está pensando...");
} else {
btn.textContent = "Enviar";
setEstado("");
input.focus();
}
}

async function apiFetch(url, options = {}) {
const response = await fetch(url, options);
const data = await response.json().catch(() => ({}));

if (!response.ok) {
const msg = data?.error || data?.reply || "Error del servidor";
throw new Error(msg);
}

return data;
}

function renderPerfilTexto(data) {
sideTitle.textContent = "Perfil";

const partes = [];

if (data.perfil_resumen?.resumen) {
partes.push("PERFIL RESUMEN");
partes.push(data.perfil_resumen.resumen);
partes.push("");
}

if (Array.isArray(data.perfil_usuario) && data.perfil_usuario.length) {
partes.push("PERFIL USUARIO");
for (const item of data.perfil_usuario) {
partes.push(`- ${item.clave}: ${item.valor}`);
}
} else {
partes.push("Sin perfil guardado.");
}

sideContent.textContent = partes.join("\n");
}

function renderMemoriaTexto(data) {
sideTitle.textContent = "Memoria";

const partes = [];

partes.push("MEMORIA RECIENTE");
if (Array.isArray(data.memoria) && data.memoria.length) {
for (const item of data.memoria) {
partes.push(`- [${item.tipo || "contexto"}] ${item.mensaje}`);
}
} else {
partes.push("Sin memoria reciente.");
}

partes.push("");
partes.push("MEMORIA IMPORTANTE");

if (Array.isArray(data.memoria_larga) && data.memoria_larga.length) {
for (const item of data.memoria_larga) {
partes.push(`- [${item.tipo || "contexto"}] ${item.mensaje}`);
}
} else {
partes.push("Sin memoria importante.");
}

sideContent.textContent = partes.join("\n");
}

function renderPanelMemoria(data) {
ultimoPanel = data;
sideTitle.textContent = "Panel de memoria";

let html = "";

html += `<div class="side-block"><strong>User ID:</strong> ${escapeHtml(data.userId || getUserId())}</div>`;

if (data.perfil_resumen?.resumen) {
html += `
<div class="side-block">
<span class="side-subtitle">PERFIL MAESTRO</span>
<div class="summary-box">${escapeHtml(data.perfil_resumen.resumen)}</div>
<div class="item-actions">
<button class="secundario" onclick="verPanelMemoria()">Refrescar</button>
</div>
</div>
`;
}

html += `<div class="side-block"><span class="side-subtitle">PERFIL ESTABLE</span>`;

if (Array.isArray(data.perfil_usuario) && data.perfil_usuario.length) {
for (const item of data.perfil_usuario) {
html += `
<div class="profile-item">
<div class="profile-text"><strong>${escapeHtml(item.clave)}:</strong> ${escapeHtml(item.valor)}</div>
<div class="profile-meta">ID: ${item.id || ""}</div>
<div class="item-actions">
<button onclick="editarPerfil(${item.id}, '${escapeHtml(item.valor)}')">Editar</button>
<button class="peligro" onclick="borrarRegistro('perfil_usuario', ${item.id})">Borrar</button>
</div>
</div>
`;
}
} else {
html += `<div>Sin perfil guardado.</div>`;
}

html += `</div>`;

html += `<div class="side-block"><span class="side-subtitle">MEMORIA RECIENTE</span>`;

if (Array.isArray(data.memoria_reciente) && data.memoria_reciente.length) {
for (const item of data.memoria_reciente) {
html += `
<div class="memory-item">
<div class="memory-text">${escapeHtml(item.mensaje)}</div>
<div class="memory-meta">
ID: ${item.id || ""}
<span class="tag">${escapeHtml(item.tipo || "contexto")}</span>
</div>
<div class="item-actions">
<button onclick="editarMemoria('memoria', ${item.id}, '${escapeHtml(item.mensaje)}')">Editar</button>
<button class="secundario" onclick="fijarMemoria('memoria', ${item.id})">Fijar</button>
<button class="peligro" onclick="borrarRegistro('memoria', ${item.id})">Borrar</button>
</div>
</div>
`;
}
} else {
html += `<div>Sin memoria reciente.</div>`;
}

html += `</div>`;

html += `<div class="side-block"><span class="side-subtitle">MEMORIA IMPORTANTE</span>`;

if (Array.isArray(data.memoria_importante) && data.memoria_importante.length) {
for (const item of data.memoria_importante) {
html += `
<div class="memory-item">
<div class="memory-text">${escapeHtml(item.mensaje)}</div>
<div class="memory-meta">
ID: ${item.id || ""}
<span class="tag">${escapeHtml(item.tipo || "contexto")}</span>
</div>
<div class="item-actions">
<button onclick="editarMemoria('memoria_larga', ${item.id}, '${escapeHtml(item.mensaje)}')">Editar</button>
<button class="peligro" onclick="borrarRegistro('memoria_larga', ${item.id})">Borrar</button>
</div>
</div>
`;
}
} else {
html += `<div>Sin memoria importante.</div>`;
}

html += `</div>`;

sideContent.innerHTML = html;
}

async function enviar() {
const message = input.value.trim();
if (!message) return;

saveUserId();
const userId = getUserId();

agregarMensaje("usuario", "Tú", message);
input.value = "";
setLoading(true);

try {
const data = await apiFetch("/api/chat", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ message, userId })
});

agregarMensaje("bot", "Pepinazo", data.reply || "Sin respuesta");

if (data.profile_summary) {
sideTitle.textContent = "Perfil resumen";
sideContent.textContent = data.profile_summary;
}
} catch (error) {
agregarMensaje("error", "Error", error.message || "No se pudo conectar con el servidor.");
} finally {
setLoading(false);
}
}

async function verPerfil() {
saveUserId();
const userId = getUserId();
setEstado("Cargando perfil...");

try {
const data = await apiFetch(`/prueba-de-memoria?userId=${encodeURIComponent(userId)}`);
renderPerfilTexto(data);
} catch (error) {
sideTitle.textContent = "Perfil";
sideContent.textContent = error.message || "No se pudo cargar el perfil.";
} finally {
setEstado("");
}
}

async function verMemoria() {
saveUserId();
const userId = getUserId();
setEstado("Cargando memoria...");

try {
const data = await apiFetch(`/prueba-de-memoria?userId=${encodeURIComponent(userId)}`);
renderMemoriaTexto(data);
} catch (error) {
sideTitle.textContent = "Memoria";
sideContent.textContent = error.message || "No se pudo cargar la memoria.";
} finally {
setEstado("");
}
}

async function verPanelMemoria() {
saveUserId();
const userId = getUserId();
setEstado("Cargando panel de memoria...");

try {
const data = await apiFetch(`/memory-panel?userId=${encodeURIComponent(userId)}`);
renderPanelMemoria(data);
} catch (error) {
sideTitle.textContent = "Panel de memoria";
sideContent.textContent = error.message || "No se pudo cargar el panel.";
} finally {
setEstado("");
}
}

async function borrarMemoria() {
saveUserId();
const userId = getUserId();

const ok = confirm(`¿Seguro que quieres borrar la memoria de ${userId}?`);
if (!ok) return;

setEstado("Borrando memoria...");

try {
await apiFetch(`/memory-clear?userId=${encodeURIComponent(userId)}`, {
method: "DELETE"
});

agregarMensaje("sistema", "Sistema", `Memoria borrada para ${userId}.`);
sideTitle.textContent = "Memoria / Perfil";
sideContent.textContent = "Memoria borrada. Vuelve a cargar perfil o memoria.";
} catch (error) {
agregarMensaje("error", "Error", error.message || "No se pudo borrar la memoria.");
} finally {
setEstado("");
}
}

async function borrarRegistro(table, id) {
const ok = confirm(`¿Borrar este registro de ${table}?`);
if (!ok) return;

setEstado("Borrando registro...");

try {
await apiFetch(`/memory/${table}/${id}?userId=${encodeURIComponent(getUserId())}`, {
method: "DELETE"
});

await verPanelMemoria();
} catch (error) {
agregarMensaje("error", "Error", error.message || "No se pudo borrar el registro.");
} finally {
setEstado("");
}
}

async function editarPerfil(id, valorActual) {
const nuevoValor = prompt("Editar valor del perfil:", valorActual);
if (nuevoValor === null) return;

const clean = nuevoValor.trim();
if (!clean) return;

setEstado("Editando perfil...");

try {
await apiFetch(`/memory/profile/${id}`, {
method: "PATCH",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
valor: clean,
userId: getUserId()
})
});

await verPanelMemoria();
} catch (error) {
agregarMensaje("error", "Error", error.message || "No se pudo editar el perfil.");
} finally {
setEstado("");
}
}

async function editarMemoria(table, id, valorActual) {
const nuevoValor = prompt("Editar recuerdo:", valorActual);
if (nuevoValor === null) return;

const clean = nuevoValor.trim();
if (!clean) return;

setEstado("Editando memoria...");

try {
await apiFetch(`/memory/message/${table}/${id}`, {
method: "PATCH",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
mensaje: clean
})
});

await verPanelMemoria();
} catch (error) {
agregarMensaje("error", "Error", error.message || "No se pudo editar la memoria.");
} finally {
setEstado("");
}
}

async function fijarMemoria(sourceTable, id) {
setEstado("Fijando recuerdo importante...");

try {
await apiFetch(`/memory/pin`, {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
sourceTable,
id,
userId: getUserId()
})
});

await verPanelMemoria();
} catch (error) {
agregarMensaje("error", "Error", error.message || "No se pudo fijar la memoria.");
} finally {
setEstado("");
}
}

input.addEventListener("keydown", function (event) {
if (event.key === "Enter" && !btn.disabled) {
enviar();
}
});

userIdInput.addEventListener("change", saveUserId);
userIdInput.addEventListener("blur", saveUserId);

loadUserId();

agregarMensaje(
"bot",
"Pepinazo",
`Hola. Ya estoy conectado al backend y listo para conversar contigo. User ID actual: ${getUserId()}.`
);
</script>
</body>
</html>
