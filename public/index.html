<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pepinazo AI</title>
<style>
body {
font-family: Arial, sans-serif;
max-width: 900px;
margin: 40px auto;
padding: 20px;
background: #f7f7f7;
color: #111;
}

h1 {
margin-bottom: 20px;
}

#chat {
border: 1px solid #ccc;
background: #fff;
padding: 15px;
min-height: 350px;
max-height: 550px;
overflow-y: auto;
white-space: pre-wrap;
border-radius: 10px;
margin-bottom: 15px;
}

.fila {
display: flex;
gap: 10px;
}

#msg {
flex: 1;
padding: 12px;
font-size: 16px;
border: 1px solid #bbb;
border-radius: 8px;
outline: none;
}

#btn {
padding: 12px 18px;
font-size: 16px;
border: none;
border-radius: 8px;
cursor: pointer;
background: #111;
color: white;
}

#btn:disabled {
opacity: 0.6;
cursor: not-allowed;
}

.mensaje {
margin-bottom: 18px;
padding-bottom: 12px;
border-bottom: 1px solid #eee;
}

.autor {
font-weight: bold;
display: block;
margin-bottom: 6px;
}

.usuario .autor {
color: #0b57d0;
}

.bot .autor {
color: #111;
}

.error .autor {
color: #b00020;
}

.texto {
line-height: 1.5;
}

.hint {
font-size: 13px;
color: #666;
margin-top: 10px;
}
</style>
</head>
<body>
<h1>Pepinazo AI</h1>

<div id="chat"></div>

<div class="fila">
<input
id="msg"
type="text"
placeholder="Escribe tu mensaje..."
autocomplete="off"
/>
<button id="btn" onclick="enviar()">Enviar</button>
</div>

<div class="hint">
Pepinazo ya conversa con backend real. Ahora sí, el muñeco dejó de ser decoración.
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("msg");
const btn = document.getElementById("btn");

function agregarMensaje(tipo, autor, texto) {
const bloque = document.createElement("div");
bloque.className = `mensaje ${tipo}`;

const autorEl = document.createElement("span");
autorEl.className = "autor";
autorEl.textContent = autor;

const textoEl = document.createElement("div");
textoEl.className = "texto";
textoEl.textContent = texto;

bloque.appendChild(autorEl);
bloque.appendChild(textoEl);
chat.appendChild(bloque);
chat.scrollTop = chat.scrollHeight;
}

async function enviar() {
const message = input.value.trim();

if (!message) return;

agregarMensaje("usuario", "Tú", message);

input.value = "";
input.disabled = true;
btn.disabled = true;
btn.textContent = "Pensando...";

try {
const response = await fetch("/api/chat", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ message })
});

const data = await response.json();

if (!response.ok) {
agregarMensaje("error", "Error", data.reply || "Error del servidor");
} else {
agregarMensaje("bot", "Pepinazo", data.reply || "Sin respuesta");
}
} catch (error) {
agregarMensaje("error", "Error", "No se pudo conectar con el servidor.");
} finally {
input.disabled = false;
btn.disabled = false;
btn.textContent = "Enviar";
input.focus();
}
}

input.addEventListener("keydown", function (event) {
if (event.key === "Enter" && !btn.disabled) {
enviar();
}
});

agregarMensaje(
"bot",
"Pepinazo",
"Hola. Ya estoy conectado al backend y listo para conversar contigo."
);
</script>
</body>
</html>
