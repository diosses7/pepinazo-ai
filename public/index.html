<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pepinazo AI</title>

<style>
body {
font-family: Arial, sans-serif;
max-width: 800px;
margin: 40px auto;
padding: 20px;
}

h1 {
margin-bottom: 20px;
}

#chat {
border: 1px solid #ccc;
padding: 15px;
min-height: 300px;
max-height: 500px;
margin-bottom: 15px;
white-space: pre-wrap;
overflow-y: auto;
}

.controles {
display: flex;
gap: 10px;
margin-bottom: 10px;
align-items: center;
}

.fila {
display: flex;
gap: 10px;
}

input {
flex: 1;
padding: 10px;
font-size: 16px;
}

button {
padding: 10px 16px;
font-size: 16px;
cursor: pointer;
}

.user {
margin-bottom: 12px;
}

.bot {
margin-bottom: 20px;
}

.provider-tag {
font-size: 12px;
color: #666;
margin-left: 6px;
}
</style>
</head>

<body>

<h1>Pepinazo AI</h1>

<div class="controles">
<label>Modelo:</label>

<select id="provider">
<option value="openai">OpenAI</option>
<option value="perplexity">Perplexity</option>
</select>
</div>

<div id="chat"></div>

<div class="fila">
<input id="msg" placeholder="Escribe mensaje" />
<button onclick="enviar()">Enviar</button>
</div>


<script>

function agregar(tipo, autor, texto) {

const chat = document.getElementById("chat")

const div = document.createElement("div")

div.className = tipo

div.innerHTML = "<b>" + autor + ":</b><br>" + texto

chat.appendChild(div)

chat.scrollTop = chat.scrollHeight

}



async function enviar() {

const input = document.getElementById("msg")

const provider = document.getElementById("provider").value

const message = input.value.trim()

if (!message) return



agregar("user", "Tú", message)

input.value = ""


try {

const r = await fetch("/api/chat", {

method: "POST",

headers: {

"Content-Type": "application/json"

},

body: JSON.stringify({

message,

provider

})

})


const data = await r.json()


agregar("bot", "Pepinazo", data.reply)


} catch (e) {

agregar("bot", "Error", "No se pudo conectar con el servidor")

}

}


document
.getElementById("msg")
.addEventListener("keydown", e => {

if (e.key === "Enter") enviar()

})

</script>

</body>
</html>
