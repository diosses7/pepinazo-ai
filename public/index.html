<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pepinazo AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    #chat {
      border: 1px solid #ccc;
      padding: 15px;
      min-height: 300px;
      max-height: 500px;
      margin-bottom: 15px;
      white-space: pre-wrap;
      overflow-y: auto;
    }

    .controles {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
    }

    .controles label {
      font-weight: bold;
    }

    .controles select {
      padding: 8px;
      font-size: 14px;
    }

    .fila {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .user {
      margin-bottom: 12px;
    }

    .bot {
      margin-bottom: 20px;
    }

    .provider-tag {
      font-size: 12px;
      color: #666;
      margin-left: 6px;
    }
  </style>
</head>
<body>
  <h1>Pepinazo AI</h1>

  <div class="controles">
    <label for="provider">Modelo:</label>
    <select id="provider">
      <option value="openai">OpenAI (GPT-4o Mini)</option>
      <option value="perplexity">Perplexity (Sonar)</option>
      <option value="claude">Claude (Sonnet)</option>
    </select>
  </div>

  <div id="chat"></div>

  <div class="fila">
    <input id="msg" placeholder="Escribe mensaje" />
    <button id="btn" onclick="enviar()">Enviar</button>
  </div>

  <script>
    function agregarMensaje(tipo, autor, texto, etiqueta) {
      const chat = document.getElementById("chat");
      const div = document.createElement("div");
      div.className = tipo;

      const strong = document.createElement("strong");
      strong.textContent = autor + ": ";

      const span = document.createElement("span");
      span.textContent = texto;

      div.appendChild(strong);

      if (etiqueta) {
        const tag = document.createElement("span");
        tag.className = "provider-tag";
        tag.textContent = "[" + etiqueta + "]";
        div.appendChild(tag);
      }

      div.appendChild(document.createElement("br"));
      div.appendChild(span);
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function enviar() {
      const input = document.getElementById("msg");
      const btn = document.getElementById("btn");
      const providerSelect = document.getElementById("provider");
      const message = input.value.trim();
      const provider = providerSelect.value;
      const providerName = providerSelect.options[providerSelect.selectedIndex].text;

      if (!message) return;

      agregarMensaje("user", "Tú", message);
      input.value = "";
      input.disabled = true;
      btn.disabled = true;
      btn.textContent = "Enviando...";

      try {
        const r = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ message, provider }),
        });

        if (!r.ok) {
          throw new Error("Error del servidor");
        }

        const data = await r.json();
        agregarMensaje("bot", "Pepinazo", data.reply || "Sin respuesta", providerName);
      } catch (error) {
        agregarMensaje("bot", "Error", "No se pudo conectar con el servidor.");
      } finally {
        input.disabled = false;
        btn.disabled = false;
        btn.textContent = "Enviar";
        input.focus();
      }
    }

    document.getElementById("msg").addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        enviar();
      }
    });
  </script>
</body>
</html>
