<!DOCTYPE html>

<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Pepinazo AI</title>

  <style>

    body {

      font-family: Arial, sans-serif;

      max-width: 800px;

      margin: 40px auto;

      padding: 20px;

    }



    h1 {

      margin-bottom: 20px;

    }



    #chat {

      border: 1px solid #ccc;

      padding: 15px;

      min-height: 300px;

      margin-bottom: 15px;

      white-space: pre-wrap;

    }



    .fila {

      display: flex;

      gap: 10px;

    }



    input {

      flex: 1;

      padding: 10px;

      font-size: 16px;

    }



    button {

      padding: 10px 16px;

      font-size: 16px;

      cursor: pointer;

    }



    .user {

      margin-bottom: 12px;

    }



    .bot {

      margin-bottom: 20px;

    }

  </style>

</head>

<body>

  <h1>Pepinazo AI</h1>



  <div id="chat"></div>



  <div class="fila">

    <input id="msg" placeholder="Escribe mensaje" />

    <button onclick="enviar()">Enviar</button>

  </div>



  <script>

    async function enviar() {

      const input = document.getElementById("msg");

      const chat = document.getElementById("chat");

      const message = input.value.trim();



      if (!message) return;



      chat.innerHTML += `<div class="user"><strong>Tú:</strong> ${message}</div>`;

      input.value = "";



      try {

        const r = await fetch("/chat", {

          method: "POST",

          headers: {

            "Content-Type": "application/json"

          },

          body: JSON.stringify({ message })

        });



        const data = await r.json();



        chat.innerHTML += `<div class="bot"><strong>Pepinazo:</strong> ${data.reply || "Sin respuesta"}</div>`;

        chat.scrollTop = chat.scrollHeight;

      } catch (error) {

        chat.innerHTML += `<div class="bot"><strong>Error:</strong> No se pudo conectar con el servidor.</div>`;

      }

    }

  </script>

</body>

</html>
